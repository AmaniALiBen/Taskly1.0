<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskly | Professional Services</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/gigs.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="animated-background"></div>

    <nav class="navbar">
        <div class="container nav-content">
            <div style="display: flex; align-items: center;">
                <button class="btn-back" title="Go Back">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <a href="../index.html" class="brand-logo">Task<span>ly</span></a>
            </div>
            <div class="header-center">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Find your next expert service...">
                </div>
            </div>
            
            <!-- User Menu (Avatar + Orders button) - Always shown since user must be logged in -->
            <div id="user-menu" class="user-menu">
                <button class="orders-btn" onclick="goToOrders()">
                    <i class="fas fa-shopping-bag"></i> Orders
                </button>
                <div class="user-avatar" onclick="goToProfile()">
                    <img id="user-avatar-img" src="https://i.pravatar.cc/100?u=default" alt="Avatar">
                </div>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <section class="filters-section">
            <div class="section-header">
                <h1 id="page-title">Design Marketplace</h1>
                
                <div class="filter-controls">
                    <!-- Price Select -->
                    <div class="custom-select" id="priceSelect">
                        <div class="select-trigger">
                            <span>Price Range</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="select-options">
                            <div class="option" data-value="low">Budget (&lt;$50)</div>
                            <div class="option" data-value="mid">Professional ($50-$200)</div>
                            <div class="option" data-value="high">Enterprise ($200+)</div>
                        </div>
                    </div>

                    <!-- Level Select -->
                    <div class="custom-select" id="levelSelect">
                        <div class="select-trigger">
                            <span>Seller Level</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="select-options">
                            <div class="option" data-value="pro">Pro Verified</div>
                            <div class="option" data-value="top">Top Rated</div>
                            <div class="option" data-value="rising">Rising Star</div>
                        </div>
                    </div>

                    <!-- Delivery Select -->
                    <div class="custom-select" id="timeSelect">
                        <div class="select-trigger">
                            <span>Delivery</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="select-options">
                            <div class="option" data-value="24h">24 Hours</div>
                            <div class="option" data-value="3d">3 Days</div>
                            <div class="option" data-value="7d">7+ Days</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="sub-nav">
                <!-- Will be populated by JavaScript -->
            </div>
        </section>

        <div id="gigs-main-container" class="gigs-main-grid">
            <div class="loading-gigs">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading gigs...</p>
            </div>
        </div>
    </main>

    <script src="../js/gigs.js"></script>
</body>
</html>
